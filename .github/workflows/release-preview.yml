name: Release Preview

run-name: Preview • ${{ github.ref_name }} • ${{ github.event.head_commit.message }}

on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+-preview[0-9]*"

permissions:
  contents: read
  actions: read
  checks: write
  packages: write

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v6

      - name: 🏷️ Set VERSION variable from tag
        run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV

      - name: ⚙️ Setup dotnet 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: ⚙️ Setup dotnet workloads
        run: dotnet workload restore

      - name: 🧹 Clean
        run: dotnet clean -c Release && dotnet nuget locals all --clear

      - name: 🏗️ Restore dependencies
        run: dotnet restore

      - name: 🛠️ Build solution
        run: dotnet build --no-restore -c:Release -p:SourceRevisionId=${VERSION} -p:Version=${VERSION}

      - name: 🚀 Publish to NuGet.org
        run: |
          dotnet nuget push **/Chronicles.*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_KEY }} --skip-duplicate
          dotnet nuget push **/Chronicles.*.snupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_KEY }} --skip-duplicate
