name: Release

run-name: Release • ${{ github.ref_name }} • ${{ github.event.head_commit.message }}

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  actions: read
  checks: write
  packages: write

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v6

      - name: 🛟 Verify commit exists in origin/main
        run: |
          git fetch --no-tags --prune --depth=1 origin +refs/heads/*:refs/remotes/origin/*
          git branch --remote --contains | grep origin/main

      - name: 🏷️ Set VERSION variable from tag
        run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> $GITHUB_ENV

      - name: ⚙️ Setup dotnet 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: ⚙️ Setup dotnet workloads
        run: dotnet workload restore

      - name: 🧹 Clean
        run: dotnet clean -c Release && dotnet nuget locals all --clear

      - name: 🏗️ Restore dependencies
        run: dotnet restore

      - name: 🛠️ Build solution
        run: dotnet build --no-restore -c:Release -p:SourceRevisionId=${VERSION} -p:Version=${VERSION}

      - name: 🧪 Run tests
        run: dotnet test --no-build -c:Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage" || true

      - name: 📋 Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Report
          path: "**/test-results.trx"
          reporter: dotnet-trx
          fail-on-error: true

      - name: 📭 Restore coverage history
        uses: dawidd6/action-download-artifact@v16
        with:
          name: CoverageHistory
          path: CoverageHistory
        continue-on-error: true

      - name: 📝 Generate Coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.3
        with:
          reports: "**/coverage.cobertura.xml"
          targetdir: CoverageReports
          historydir: CoverageHistory
          reporttypes: MarkdownSummaryGithub;MarkdownDeltaSummary
          filefilters: -*.g.cs
          tag: '${{ github.run_number }}_${{ github.run_id }}'

      - name: 📨 Post code coverage results
        run: |
          cat CoverageReports/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: 📬 Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: CoverageReports
          path: CoverageReports

      - name: 📦 Publish to GitHub Packages
        run: dotnet nuget push **/Chronicles.*.nupkg -k ${{ secrets.GITHUB_TOKEN }} -s https://nuget.pkg.github.com/chronicles-net/index.json --skip-duplicate --no-symbols

      # - name: 🚀 Publish to NuGet.org
      #   run: |
      #     dotnet nuget push **/Chronicles.*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
      #     dotnet nuget push **/Chronicles.*.snupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/Chronicles.*.nupkg
            **/Chronicles.*.snupkg

